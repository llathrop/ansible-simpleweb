---
- name: Gather UniFi AP Logs
  hosts: all
  gather_facts: false
  tasks:
    - name: Get system logs
      raw: tail -n 100 /var/log/messages
      register: system_logs

    - name: Get kernel logs
      raw: dmesg | tail -n 50
      register: kernel_logs

    - name: Display system logs
      debug:
        msg: "{{ system_logs.stdout_lines }}"

    - name: Save logs to file
      copy:
        content: |
          === SYSTEM LOGS ===
          {{ system_logs.stdout }}
          
          === KERNEL LOGS ===
          {{ kernel_logs.stdout }}
        dest: "logs/unifi_{{ inventory_hostname }}_logs.txt"
      delegate_to: localhost
